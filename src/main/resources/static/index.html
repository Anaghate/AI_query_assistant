<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>AI Assistant</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #f5f5f5; display: flex;
            justify-content: center; align-items: center; height: 100vh; }
        .chat-box { width: 600px; background: white; border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: #5c47d4; color: white; padding: 18px 20px;
            font-size: 18px; font-weight: 600; }
        .messages { height: 380px; overflow-y: auto; padding: 16px;
            display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 80%; padding: 10px 14px; border-radius: 10px;
            font-size: 14px; line-height: 1.5; white-space: pre-wrap; }
        .user  { background: #5c47d4; color: white; align-self: flex-end; }
        .bot   { background: #f0f0f0; color: #333; align-self: flex-start; }
        .input-row { display: flex; border-top: 1px solid #eee; }
        input  { flex: 1; padding: 14px 16px; border: none; outline: none;
            font-size: 14px; }
        button { padding: 14px 20px; background: #5c47d4; color: white;
            border: none; cursor: pointer; font-size: 14px; }
        button:hover { background: #4a38b8; }
        .loading { color: #999; font-style: italic; }
    </style>
</head>
<body>
<div class="chat-box">
    <div class="header">AI Assistant (Claude)</div>
    <div class="messages" id="messages">
        <div class="msg bot">Hello! Ask me anything.</div>
    </div>
    <div class="input-row">
        <input id="input" type="text" placeholder="Type your question..."
               onkeydown="if(event.key==='Enter') sendMessage()"/>
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    async function sendMessage() {
        const input = document.getElementById('input');
        const question = input.value.trim();
        if (!question) return;

        addMessage(question, 'user');
        input.value = '';

        const loading = addMessage('Thinking...', 'bot loading');

        try {
            const res = await fetch('/api/ask', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ question })
            });
            const data = await res.json();
            loading.textContent = data.answer;
            loading.className = 'msg bot';
        } catch (e) {
            loading.textContent = 'Error: could not reach the server.';
            loading.className = 'msg bot';
        }
    }

    function addMessage(text, cls) {
        const div = document.createElement('div');
        div.className = 'msg ' + cls;
        div.textContent = text;
        const box = document.getElementById('messages');
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
        return div;
    }
</script>
</body>
</html>
