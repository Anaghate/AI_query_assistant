<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>AI Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@300;400;600&display=swap" rel="stylesheet"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0d0d0f;
            --surface: #141416;
            --surface2: #1c1c20;
            --border: #2a2a30;
            --border2: #38383f;
            --text: #f0ede8;
            --muted: #7a7880;
            --hint: #4a4858;
            --accent: #c8f060;
            --accent2: #a8d840;
            --chat-user: #1e1e28;
            --chat-bot: #161618;
            --red: #ff5f5f;
            --orange: #ff9a3c;
            --yellow: #ffd166;
            --green: #c8f060;
            --radius: 12px;
            --radius-sm: 8px;
        }

        body {
            font-family: 'Sora', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px 16px;
        }

        /* Header */
        .header {
            width: 100%;
            max-width: 720px;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-family: 'DM Mono', monospace;
            font-size: 13px;
            color: var(--accent);
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .status-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--accent);
            display: inline-block;
            margin-right: 6px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* Tab switcher */
        .tabs {
            display: flex;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 4px;
            gap: 4px;
            width: 100%;
            max-width: 720px;
            margin-bottom: 16px;
        }

        .tab {
            flex: 1;
            padding: 10px 16px;
            border-radius: 7px;
            border: none;
            background: transparent;
            color: var(--muted);
            font-family: 'Sora', sans-serif;
            font-size: 13px;
            font-weight: 400;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .tab:hover { color: var(--text); }

        .tab.active {
            background: var(--surface2);
            color: var(--accent);
            font-weight: 600;
            border: 1px solid var(--border2);
        }

        .tab-icon {
            width: 16px; height: 16px;
            flex-shrink: 0;
        }

        /* Panels */
        .panel {
            width: 100%;
            max-width: 720px;
            display: none;
            animation: fadeIn 0.25s ease;
        }

        .panel.active { display: flex; flex-direction: column; gap: 0; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ─── CHAT PANEL ─── */
        .chat-container {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 580px;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        .chat-messages::-webkit-scrollbar { width: 4px; }
        .chat-messages::-webkit-scrollbar-track { background: transparent; }
        .chat-messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

        .msg {
            display: flex;
            gap: 10px;
            align-items: flex-start;
            max-width: 85%;
        }

        .msg.user { align-self: flex-end; flex-direction: row-reverse; }
        .msg.bot  { align-self: flex-start; }

        .msg-avatar {
            width: 28px; height: 28px;
            border-radius: 6px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-family: 'DM Mono', monospace;
        }

        .msg.user .msg-avatar { background: var(--accent); color: #0d0d0f; font-weight: 500; }
        .msg.bot  .msg-avatar { background: var(--surface2); border: 1px solid var(--border2); color: var(--accent); }

        .msg-bubble {
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        .msg.user .msg-bubble {
            background: var(--chat-user);
            border: 1px solid var(--border2);
            color: var(--text);
            border-top-right-radius: 3px;
        }

        .msg.bot .msg-bubble {
            background: var(--chat-bot);
            border: 1px solid var(--border);
            color: var(--text);
            border-top-left-radius: 3px;
        }

        .msg-bubble.thinking {
            color: var(--muted);
            font-style: italic;
            font-size: 13px;
        }

        /* Typing dots */
        .typing-dots span {
            display: inline-block;
            width: 5px; height: 5px;
            border-radius: 50%;
            background: var(--muted);
            margin: 0 2px;
            animation: bounce 1.2s ease-in-out infinite;
        }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-5px); }
        }

        .chat-input-row {
            display: flex;
            border-top: 1px solid var(--border);
            background: var(--surface);
        }

        .chat-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            padding: 16px 18px;
            font-family: 'Sora', sans-serif;
            font-size: 14px;
            color: var(--text);
        }

        .chat-input::placeholder { color: var(--hint); }

        .send-btn {
            padding: 0 20px;
            background: var(--accent);
            border: none;
            cursor: pointer;
            color: #0d0d0f;
            font-family: 'DM Mono', monospace;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.05em;
            transition: background 0.15s;
        }

        .send-btn:hover { background: var(--accent2); }
        .send-btn:disabled { background: var(--border2); color: var(--muted); cursor: not-allowed; }

        /* ─── DAMAGE PANEL ─── */
        .damage-container {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }

        .damage-body { padding: 24px; display: flex; flex-direction: column; gap: 18px; }

        .drop-zone {
            border: 1.5px dashed var(--border2);
            border-radius: var(--radius);
            padding: 36px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }

        .drop-zone:hover { border-color: var(--accent); }
        .drop-zone.dragover { border-color: var(--accent); background: rgba(200,240,96,0.04); }
        .drop-zone.has-image { padding: 10px; border-style: solid; border-color: var(--border2); }

        .drop-icon {
            width: 40px; height: 40px;
            margin: 0 auto 12px;
            color: var(--hint);
        }

        .drop-text { font-size: 14px; color: var(--muted); }
        .drop-sub { font-size: 12px; color: var(--hint); margin-top: 4px; font-family: 'DM Mono', monospace; }

        #preview {
            max-width: 100%;
            max-height: 300px;
            border-radius: 8px;
            display: none;
            object-fit: contain;
        }

        .analyze-btn {
            width: 100%;
            padding: 13px;
            background: var(--accent);
            border: none;
            border-radius: var(--radius-sm);
            font-family: 'DM Mono', monospace;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.06em;
            color: #0d0d0f;
            cursor: pointer;
            transition: background 0.15s;
        }

        .analyze-btn:hover { background: var(--accent2); }
        .analyze-btn:disabled { background: var(--border2); color: var(--muted); cursor: not-allowed; }

        .processing-bar {
            display: none;
            gap: 10px;
            align-items: center;
            font-size: 13px;
            color: var(--muted);
            font-family: 'DM Mono', monospace;
        }

        .bar-track {
            flex: 1;
            height: 3px;
            background: var(--border);
            border-radius: 2px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            background: var(--accent);
            width: 0%;
            border-radius: 2px;
            animation: loading 2s ease-in-out infinite;
        }

        @keyframes loading {
            0% { width: 0%; }
            50% { width: 80%; }
            100% { width: 95%; }
        }

        /* Result card */
        .result-card {
            display: none;
            background: var(--surface2);
            border: 1px solid var(--border2);
            border-radius: var(--radius);
            overflow: hidden;
            animation: fadeIn 0.3s ease;
        }

        .result-header {
            padding: 14px 18px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .result-title {
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            letter-spacing: 0.1em;
            color: var(--muted);
            text-transform: uppercase;
        }

        .severity-badge {
            padding: 3px 10px;
            border-radius: 20px;
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .severity-badge.severe   { background: rgba(255,95,95,0.15); color: var(--red); border: 1px solid rgba(255,95,95,0.3); }
        .severity-badge.moderate { background: rgba(255,154,60,0.15); color: var(--orange); border: 1px solid rgba(255,154,60,0.3); }
        .severity-badge.minor    { background: rgba(255,209,102,0.15); color: var(--yellow); border: 1px solid rgba(255,209,102,0.3); }
        .severity-badge.none     { background: rgba(200,240,96,0.15); color: var(--green); border: 1px solid rgba(200,240,96,0.3); }

        .result-body { padding: 18px; display: flex; flex-direction: column; gap: 12px; }

        .result-row {
            display: flex;
            gap: 16px;
            align-items: flex-start;
        }

        .result-label {
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            color: var(--hint);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            min-width: 90px;
            padding-top: 1px;
        }

        .result-value { font-size: 14px; color: var(--text); line-height: 1.5; }

        .result-footer {
            padding: 10px 18px;
            border-top: 1px solid var(--border);
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            color: var(--hint);
        }

        /* info pills row */
        .info-pills {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .pill {
            padding: 4px 10px;
            border-radius: 20px;
            border: 1px solid var(--border2);
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            color: var(--muted);
        }
    </style>
</head>
<body>

<div class="header">
    <div class="header-top">
        <span class="logo"><span class="status-dot"></span>AI Assistant</span>
        <span style="font-family:'DM Mono',monospace;font-size:11px;color:var(--hint)">claude-sonnet-4-5</span>
    </div>
</div>

<!-- Tab switcher -->
<div class="tabs">
    <button class="tab active" onclick="switchTab('chat', this)">
        <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        Chat assistant
    </button>
    <button class="tab" onclick="switchTab('damage', this)">
        <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
        </svg>
        Car damage analyzer
    </button>
</div>

<!-- ─── CHAT PANEL ─── -->
<div class="panel active" id="panel-chat">
    <div class="chat-container">
        <div class="chat-messages" id="chatMessages">
            <div class="msg bot">
                <div class="msg-avatar">AI</div>
                <div class="msg-bubble">Hey! Ask me anything — I'm powered by Claude.</div>
            </div>
        </div>
        <div class="chat-input-row">
            <input class="chat-input" id="chatInput" type="text"
                   placeholder="Type your question..."
                   onkeydown="if(event.key==='Enter') sendChat()"/>
            <button class="send-btn" id="sendBtn" onclick="sendChat()">SEND</button>
        </div>
    </div>
</div>

<!-- ─── DAMAGE PANEL ─── -->
<div class="panel" id="panel-damage">
    <div class="damage-container">
        <div class="damage-body">

            <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
                <svg class="drop-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2"/>
                    <circle cx="8.5" cy="8.5" r="1.5"/>
                    <polyline points="21 15 16 10 5 21"/>
                </svg>
                <p class="drop-text">Click or drag a car photo here</p>
                <p class="drop-sub">JPG, PNG, WEBP — max 10MB</p>
                <img id="preview"/>
            </div>

            <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleFile(this.files[0])"/>

            <div class="info-pills" id="imageMeta" style="display:none">
                <span class="pill" id="pillName"></span>
                <span class="pill" id="pillSize"></span>
            </div>

            <button class="analyze-btn" id="analyzeBtn" onclick="analyze()" disabled>
                ANALYZE DAMAGE
            </button>

            <div class="processing-bar" id="processingBar">
                <span>Processing</span>
                <div class="bar-track"><div class="bar-fill"></div></div>
            </div>

            <div class="result-card" id="resultCard">
                <div class="result-header">
                    <span class="result-title">Damage report</span>
                    <span class="severity-badge" id="severityBadge"></span>
                </div>
                <div class="result-body">
                    <div class="result-row">
                        <span class="result-label">Location</span>
                        <span class="result-value" id="resLocation">—</span>
                    </div>
                    <div class="result-row">
                        <span class="result-label">Description</span>
                        <span class="result-value" id="resDescription">—</span>
                    </div>
                    <div class="result-row">
                        <span class="result-label">Detected</span>
                        <span class="result-value" id="resDetected">—</span>
                    </div>
                </div>
                <div class="result-footer" id="resTokens"></div>
            </div>

        </div>
    </div>
</div>

<script>
    /* ── Tab switching ── */
    function switchTab(name, btn) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('panel-' + name).classList.add('active');
    }

    /* ── CHAT ── */
    let chatBusy = false;

    function addMsg(text, role, cls) {
        const box = document.getElementById('chatMessages');
        const wrap = document.createElement('div');
        wrap.className = 'msg ' + role;

        const avatar = document.createElement('div');
        avatar.className = 'msg-avatar';
        avatar.textContent = role === 'user' ? 'U' : 'AI';

        const bubble = document.createElement('div');
        bubble.className = 'msg-bubble' + (cls ? ' ' + cls : '');
        bubble.innerHTML = text;

        wrap.appendChild(avatar);
        wrap.appendChild(bubble);
        box.appendChild(wrap);
        box.scrollTop = box.scrollHeight;
        return bubble;
    }

    async function sendChat() {
        if (chatBusy) return;
        const input = document.getElementById('chatInput');
        const question = input.value.trim();
        if (!question) return;

        addMsg(question, 'user');
        input.value = '';
        chatBusy = true;
        document.getElementById('sendBtn').disabled = true;

        const thinking = addMsg(
            '<span class="typing-dots"><span></span><span></span><span></span></span>',
            'bot', 'thinking'
        );

        try {
            const res = await fetch('/api/ask', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ question })
            });
            const data = await res.json();
            thinking.className = 'msg-bubble';
            thinking.textContent = data.answer;
        } catch (e) {
            thinking.className = 'msg-bubble';
            thinking.textContent = 'Error — could not reach the server.';
        } finally {
            chatBusy = false;
            document.getElementById('sendBtn').disabled = false;
            document.getElementById('chatMessages').scrollTop = 9999;
        }
    }

    document.getElementById('chatInput').addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
    });

    /* ── DAMAGE ANALYZER ── */
    let selectedFile = null;

    function handleFile(file) {
        if (!file) return;
        selectedFile = file;
        const reader = new FileReader();
        reader.onload = e => {
            const preview = document.getElementById('preview');
            preview.src = e.target.result;
            preview.style.display = 'block';
            document.querySelector('.drop-icon').style.display = 'none';
            document.querySelector('.drop-text').style.display = 'none';
            document.querySelector('.drop-sub').style.display = 'none';
            document.getElementById('dropZone').classList.add('has-image');
            document.getElementById('analyzeBtn').disabled = false;
            document.getElementById('imageMeta').style.display = 'flex';
            document.getElementById('pillName').textContent = file.name;
            document.getElementById('pillSize').textContent = (file.size / 1024).toFixed(0) + ' KB';
            document.getElementById('resultCard').style.display = 'none';
        };
        reader.readAsDataURL(file);
    }

    async function analyze() {
        if (!selectedFile) return;

        document.getElementById('analyzeBtn').disabled = true;
        document.getElementById('processingBar').style.display = 'flex';
        document.getElementById('resultCard').style.display = 'none';

        const formData = new FormData();
        formData.append('image', selectedFile);

        try {
            const res = await fetch('/api/analyze', { method: 'POST', body: formData });
            const data = await res.json();

            const sev = (data.severity || 'none').toLowerCase();
            const badge = document.getElementById('severityBadge');
            badge.textContent = sev;
            badge.className = 'severity-badge ' + sev;

            document.getElementById('resLocation').textContent = data.damageLocation || '—';
            document.getElementById('resDescription').textContent = data.description || '—';
            document.getElementById('resDetected').textContent = data.damageDetected ? 'Yes' : 'No';
            document.getElementById('resTokens').textContent = 'Tokens — ' + (data.tokensUsed || '—');

            document.getElementById('resultCard').style.display = 'block';
        } catch (e) {
            alert('Error: ' + e.message);
        } finally {
            document.getElementById('processingBar').style.display = 'none';
            document.getElementById('analyzeBtn').disabled = false;
        }
    }

    /* Drag and drop */
    const zone = document.getElementById('dropZone');
    zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
    zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
    zone.addEventListener('drop', e => {
        e.preventDefault();
        zone.classList.remove('dragover');
        handleFile(e.dataTransfer.files[0]);
    });
</script>
</body>
</html>
